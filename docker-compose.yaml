services:
  service:
    build:
      context: .
      target: service
    ports:
      - "8080:8080"
    environment:
      # OAuth App credentials. Callback URL must be <frontend-origin>/auth/callback.
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID:-}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET:-}"
      # Comma-separated allowed origins for CORS ("*" for local dev).
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-*}"
    command: uvicorn openapi_server.main:app --host 0.0.0.0 --port 8080
