openapi: 3.0.3
info:
  contact:
    name: CardForge
  description: |
    Backend API for CardForge. Authentication is handled via GitHub App OAuth flow (server-side). The backend manages GitHub tokens and interacts with GitHub on behalf of the user.
  title: CardForge API
  version: 3.0.0
servers:
- description: CardForge backend (relative)
  url: /api
paths:
  /auth/github:
    get:
      description: |
        Returns a redirect URL to GitHub's authorization page. The frontend should redirect the user to this URL. The state parameter is generated server-side for CSRF protection.
      operationId: initiateGitHubAuth
      parameters:
      - description: URL to redirect back to after auth completes
        explode: true
        in: query
        name: return_to
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/initiateGitHubAuth_200_response"
          description: Authorization URL
      summary: Initiate GitHub App OAuth flow
      tags:
      - Auth
  /auth/github/callback:
    get:
      description: |
        Receives the authorization code from GitHub after user approves. Exchanges it for an access token via the GitHub App. Creates or updates the user session and returns a session token.
      operationId: handleGitHubCallback
      parameters:
      - description: Authorization code from GitHub
        explode: true
        in: query
        name: code
        required: true
        schema:
          type: string
        style: form
      - description: CSRF state token for validation
        explode: true
        in: query
        name: state
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
          description: "Authentication successful, returns session"
        "400":
          description: Invalid or expired code/state
        "403":
          description: User denied authorization
      summary: Handle GitHub OAuth callback
      tags:
      - Auth
  /auth/me:
    get:
      description: |
        Returns the currently authenticated user based on the session token. The backend resolves the GitHub identity from the stored access token.
      operationId: getMe
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
          description: Authenticated user
        "401":
          description: Not authenticated or session expired
      security:
      - sessionAuth: []
      summary: Get current authenticated user
      tags:
      - Auth
  /auth/logout:
    post:
      description: |
        Invalidates the current session token and revokes the GitHub installation token if applicable.
      operationId: logout
      responses:
        "204":
          description: Logged out successfully
        "401":
          description: Not authenticated
      security:
      - sessionAuth: []
      summary: Log out and destroy session
      tags:
      - Auth
  /auth/installations:
    get:
      description: |
        Returns the GitHub App installations accessible to the authenticated user. Used to determine which organizations/accounts have the app installed.
      operationId: listInstallations
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Installation"
                type: array
          description: List of installations
        "401":
          description: Not authenticated
      security:
      - sessionAuth: []
      summary: List GitHub App installations for the user
      tags:
      - Auth
  /repos:
    get:
      description: |
        Returns repositories accessible via the GitHub App installation. Filtered to repos where the user has push access.
      operationId: listRepos
      parameters:
      - description: Filter by specific installation
        explode: true
        in: query
        name: installation_id
        required: false
        schema:
          type: integer
        style: form
      - explode: true
        in: query
        name: sort
        required: false
        schema:
          default: updated
          enum:
          - updated
          - created
          - pushed
          - full_name
          type: string
        style: form
      - explode: true
        in: query
        name: per_page
        required: false
        schema:
          default: 30
          maximum: 100
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/RepoSummary"
                type: array
          description: List of repositories
        "401":
          description: Not authenticated
      security:
      - sessionAuth: []
      summary: List repositories the user can push to
      tags:
      - Repos
  /projects/{projectId}/save:
    post:
      description: |
        Receives the full project payload. The backend generates template.json, data.csv, card HTML files, and JSON-LD (if TCG annotations are present), then commits them to the specified GitHub repo under `cardforge/{projectName}/`.
      operationId: saveProject
      parameters:
      - explode: false
        in: path
        name: projectId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveProjectRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveProjectResponse"
          description: Project saved successfully
        "400":
          description: Invalid project or missing template
        "401":
          description: Not authenticated
      security:
      - sessionAuth: []
      summary: Save a CardForge project to a GitHub repo
      tags:
      - Projects
  /projects/{projectId}/load:
    get:
      description: |
        Reads template.json and data.csv from the repo and reconstructs the CardProject object.
      operationId: loadProject
      parameters:
      - explode: false
        in: path
        name: projectId
        required: true
        schema:
          type: string
        style: simple
      - description: Full repo name (owner/repo)
        explode: true
        in: query
        name: repo
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardProject"
          description: Project loaded
        "404":
          description: Project not found in repo
      security:
      - sessionAuth: []
      summary: Load a CardForge project from a GitHub repo
      tags:
      - Projects
  /projects/{projectId}/export:
    post:
      description: |
        Returns a zip archive of generated HTML cards, JSON-LD, template.json, and data.csv — without committing to a repo.
      operationId: exportProject
      parameters:
      - explode: false
        in: path
        name: projectId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportProjectRequest"
        required: true
      responses:
        "200":
          content:
            application/zip:
              schema:
                format: binary
                type: string
          description: Zip archive
      security:
      - sessionAuth: []
      summary: Export rendered cards without saving to GitHub
      tags:
      - Projects
