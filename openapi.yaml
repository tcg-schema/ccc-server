openapi: 3.0.3
info:
  title: CardForge Proxy
  version: 4.0.0
  contact:
    name: CardForge
  description: |
    Stateless helper service for CardForge. CardForge stores all card projects
    directly in the user's own GitHub repositories; the browser talks to
    api.github.com with the user's token. This service only provides:

    1. GitHub OAuth token exchange — the browser runs the Authorization-Code +
       PKCE flow itself, then posts the code here to be swapped for a token
       (GitHub's token endpoint has no CORS, and still requires the client
       secret even with PKCE, so the secret is injected server-side).
    2. Optional remote PDF rendering via WeasyPrint.

    There is no database and no stored state.
servers:
  - url: /
    description: CardForge proxy (relative)
paths:
  /healthz:
    get:
      summary: Liveness probe
      operationId: healthz
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  client_id_configured: { type: boolean }
                  client_secret_configured: { type: boolean }
  /auth/github/exchange:
    post:
      summary: Exchange an OAuth authorization code for an access token
      operationId: githubExchange
      description: |
        The browser runs the Authorization-Code + PKCE flow and posts the
        resulting code here. The relay injects the client secret server-side
        and proxies GitHub's `POST /login/oauth/access_token`, returning the
        JSON verbatim. The token is never stored.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
                redirect_uri: { type: string }
                code_verifier: { type: string }
                client_id: { type: string }
      responses:
        "200":
          description: Token or error payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Missing code
  /proxy/image:
    get:
      summary: Re-serve an external image (CORS-clean)
      operationId: proxyImage
      description: Fetches an http(s) image server-side and returns it with CORS headers, so the browser can rasterise cards that use cross-origin image URLs without tainting the canvas.
      parameters:
        - name: url
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: The image bytes
          content:
            image/*:
              schema: { type: string, format: binary }
        "400": { description: Invalid url }
        "415": { description: Not an image }
  /render/pdf:
    post:
      summary: Render a CardProject to PDF (remote render)
      operationId: renderPdf
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project]
              properties:
                project:
                  type: object
                  description: A CardProject JSON object (see the frontend types).
      responses:
        "200":
          description: PDF document
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          description: Missing project
components:
  schemas:
    TokenResponse:
      type: object
      properties:
        access_token: { type: string }
        token_type: { type: string }
        scope: { type: string }
        error: { type: string }
        error_description: { type: string }
